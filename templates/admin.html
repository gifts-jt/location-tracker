<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:#f5f5f5;
            padding:40px;

        }

        h1{

            text-align:center;
            margin-bottom:30px;

        }

        table{

            width:100%;
            border-collapse:collapse;
            background:white;
            box-shadow:0 0 15px rgba(0,0,0,.1);

        }

        th{

            background:#007BFF;
            color:white;
            padding:15px;

        }

        td{

            padding:12px;
            text-align:center;
            border-bottom:1px solid #ddd;

        }

        tr:hover{

            background:#f2f2f2;

        }

        a{

            text-decoration:none;
            background:#28a745;
            color:white;
            padding:8px 15px;
            border-radius:5px;

        }

        a:hover{

            background:#218838;

        }

    </style>

</head>

<body>

<h1>Location Records</h1>

<table>

<tr>

<th>ID</th>

<th>Latitude</th>

<th>Longitude</th>

<th>Accuracy</th>

<th>IP Address</th>

<th>Date & Time</th>

<th>Map</th>

</tr>

{% for row in rows %}

<tr>

<td>{{ row[0] }}</td>

<td>{{ row[1] }}</td>

<td>{{ row[2] }}</td>

<td>{{ row[3] }} m</td>

<td>{{ row[4] }}</td>

<td>{{ row[5] }}</td>

<td>

<a
href="https://www.google.com/maps?q={{ row[1] }},{{ row[2] }}"
target="_blank">

View Map

</a>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
